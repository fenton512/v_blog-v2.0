name: CI/CD Pipeline

on:
  push:
    branches:
      - deploy

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env
        run: |
            # Frontend env
            echo "VUE_APP_HOST=${{ secrets.VUE_APP_HOST }}" >> front/.env
            echo "VUE_APP_ROOT_ADDRESS=${{ secrets.VUE_APP_ROOT_ADDRESS }}" >> front/.env
            # Backend env
            echo "DATEBASE_URL=${{ secrets.DATEBASE_URL }}" >> .env
            echo "SECRET_KEY_ACCESS=${{ secrets.SECRET_KEY_ACCESS }}" >> .env
            echo "SECRET_KEY_REFRESH=${{ secrets.SECRET_KEY_REFRESH }}" >> .env
            echo "ALGORITHM=${{ secrets.ALGORITHM }}" >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env

      - name: Build and run docker-compose
        run: |
          docker compose up -d --build
          docker compose ps

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/viktor
            BACKUP_NAME=db_backup_$(date +%Y%m%d_%H%M%S).sql
            docker compose exec db pg_dump -U $POSTGRES_USER -d $POSTGRES_DB -f /tmp/$BACKUP_NAME
            docker cp viktor-db-1:/tmp/$BACKUP_NAME back/db_backups/
            git pull origin deploy
            docker compose down
            docker compose up -d --build
